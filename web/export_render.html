<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OWN Subtitle Export Renderer</title>
    <!-- Load identical fonts and styles to the main app for accurate rendering -->

    <link href="css/app.css" rel="stylesheet"/>
    <script src="js/preview.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
        #subtitle-canvas {
            display: block;
        }
    </style>
</head>
<body>
    <!-- The canvas will be sized to the target video resolution -->
    <canvas id="subtitle-canvas"></canvas>

    <script>
        let preview = null;
        let mockVideo = {
            currentTime: 0,
            videoWidth: 1920,
            videoHeight: 1080,
            getBoundingClientRect: function() {
                return { width: this.videoWidth, height: this.videoHeight };
            }
        };

        // This is called once by Python to set up the environment
        window.initRenderer = async function(width, height, subtitleTrackJson, customFonts) {
            mockVideo.videoWidth = width;
            mockVideo.videoHeight = height;

            const canvas = document.getElementById('subtitle-canvas');
            canvas.width = width;
            canvas.height = height;

            // Load custom fonts from injected local file URIs
            try {
                const fonts = customFonts || [];
                for (const font of fonts) {
                    const style = document.createElement('style');
                    style.textContent = `@font-face { font-family: '${font.name}'; src: url('${font.url}'); font-display: swap; }`;
                    document.head.appendChild(style);
                }
                // Wait for all fonts to be loaded before rendering
                await document.fonts.ready;
            } catch (err) {
                console.error('Failed to load custom fonts', err);
            }

            preview = new SubtitlePreview(mockVideo, canvas);
            
            // The JSON sent from Python
            const track = JSON.parse(subtitleTrackJson);
            
            // Rehydrate the SubtitleTrack methods since JSON.parse just gives a plain object
            // We just need the segment_at method which preview.js doesn't actually call directly,
            // preview.js expects `activeSeg` to be passed, or it finds it. Wait, preview.draw() finds it:
            // let activeSeg = track.segments.find(s => currentTime >= s.start_time && currentTime <= s.end_time);
            // This is perfect, preview.js handles finding the segment itself without class methods.

            preview.setTrack(track);

            // Do not call preview.start() because we don't want a requestAnimationFrame loop.
            // We will render specific frames on demand.
        };

        // This is called by Python for every frame
        // It renders the subtitle and returns the RGBA pixel array
        window.renderFrame = function(currentTime) {
            mockVideo.currentTime = currentTime;
            
            // Resize canvas to match mockVideo dimensions if needed
            preview.resizeCanvas();
            
            // Draw the current frame
            preview.draw();

            // Extract the pixel data
            const ctx = preview.canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, preview.canvas.width, preview.canvas.height);
            
            // Return raw Uint8ClampedArray data
            // Playwright can transfer TypedArrays back to Python very efficiently
            return imgData.data;
        };

        // Batch rendering optimized by cropping to subtitle bounding box
        window.renderFrameBatch = function(timestamps) {
            const results = [];

            for (let t of timestamps) {
                mockVideo.currentTime = t;
                preview.draw();
                
                if (preview._lastBBox) {
                    results.push({
                        has_subtitle: true,
                        x: 0,
                        y: 0,
                        data: preview.canvas.toDataURL('image/png')
                    });
                    continue;
                }
                
                // Fallback for empty frames
                results.push({ has_subtitle: false });
            }
            return results;
        };

    </script>
</body>
</html>
