<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OWN Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="/css/app.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffe74d",
                        "primary-hover": "#ffd700",
                        "bg-dark": "#23200f",
                        "bg-surface": "#2d2914",
                        "bg-elevated": "#352f1a",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
</head>
<body class="bg-bg-dark font-display text-slate-100 antialiased overflow-hidden">
<div class="flex flex-col h-screen">
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-4 py-2 border-b border-white/10 bg-bg-dark z-20">
        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <div class="size-7 bg-primary rounded flex items-center justify-center">
                    <span class="material-symbols-outlined text-bg-dark" style="font-size:16px">closed_caption</span>
                </div>
                <span class="text-sm font-bold text-white">OWN</span>
            </a>
            <span class="text-white/20">|</span>
            <h2 class="text-sm font-medium text-white truncate max-w-[200px]" id="project-title">Loading...</h2>
            <span class="text-xs text-slate-400" id="save-status">Saved</span>
        </div>
        <div class="flex items-center gap-2">
            <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm bg-white/5 border border-white/10 rounded-lg text-white hover:bg-white/10 transition-colors" id="btn-srt">
                <span class="material-symbols-outlined" style="font-size:16px">download</span> SRT
            </button>
            <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm bg-primary text-bg-dark rounded-lg font-bold hover:bg-primary-hover transition-colors" id="btn-export">
                <span class="material-symbols-outlined" style="font-size:16px">movie_edit</span> Export Video
            </button>
        </div>
    </header>

    <!-- Main Editor Layout -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Left Panel — Transcript -->
        <div class="w-80 flex flex-col border-r border-white/10 bg-bg-dark">
            <div class="flex border-b border-white/10">
                <button class="tab-btn active flex-1" data-tab="segments">Segments</button>
                <button class="tab-btn flex-1" data-tab="fulltext">Full Text</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="segments-panel">
                <p class="text-sm text-slate-400">No transcript yet. Transcribe the video first.</p>
            </div>
            <div class="flex-1 overflow-y-auto p-4 hidden" id="fulltext-panel">
                <textarea class="w-full h-full bg-transparent text-sm text-slate-200 resize-none focus:outline-none" id="fulltext-area" placeholder="Full transcript text..."></textarea>
            </div>
        </div>

        <!-- Center — Video Preview -->
        <div class="flex-1 flex flex-col items-center justify-center bg-bg-surface relative">
            <div class="relative" id="preview-container">
                <video id="video-player" class="max-w-full max-h-[60vh] bg-black rounded-lg"></video>
                <canvas id="subtitle-canvas" class="absolute top-0 left-0 w-full h-full cursor-pointer"></canvas>
            </div>
            <!-- Playback Controls -->
            <div class="flex items-center gap-4 mt-4 px-4 w-full max-w-lg">
                <button class="text-white hover:text-primary transition-colors" id="btn-play">
                    <span class="material-symbols-outlined text-2xl">play_arrow</span>
                </button>
                <span class="text-xs text-slate-400 w-12 text-right tabular-nums" id="time-current">00:00</span>
                <div class="flex-1 h-1 bg-white/10 rounded-full cursor-pointer relative group" id="seek-bar">
                    <div class="h-full bg-primary rounded-full" id="seek-progress" style="width:0%"></div>
                    <div class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-primary rounded-full shadow opacity-0 group-hover:opacity-100 transition-opacity" id="seek-thumb" style="left:0%"></div>
                </div>
                <span class="text-xs text-slate-400 w-12 tabular-nums" id="time-total">00:00</span>
                <button class="text-white hover:text-primary transition-colors" id="btn-mute">
                    <span class="material-symbols-outlined text-xl">volume_up</span>
                </button>
            </div>
        </div>

        <!-- Right Panel — Styles -->
        <div class="w-72 flex flex-col border-l border-white/10 bg-bg-dark">
            <div class="flex border-b border-white/10 overflow-x-auto">
                <button class="tab-btn active flex-shrink-0" data-tab="text-style">Text</button>
                <button class="tab-btn flex-shrink-0" data-tab="templates">Templates</button>
                <button class="tab-btn flex-shrink-0" data-tab="animation">Animation</button>
            </div>

            <!-- Text Style Tab -->
            <div class="flex-1 overflow-y-auto p-4 space-y-5" id="text-style-panel">
                <!-- Font -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Font Family</label>
                    <select id="style-font" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-white text-sm">
                        <option value="Noto Sans Devanagari" class="bg-bg-dark text-slate-100">Noto Sans Devanagari</option>
                        <option value="Mukta" class="bg-bg-dark text-slate-100">Mukta</option>
                        <option value="Baloo 2" class="bg-bg-dark text-slate-100">Baloo 2</option>
                    </select>
                </div>
                <!-- Font Size -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Font Size: <span id="font-size-val">48</span></label>
                    <input type="range" id="style-font-size" min="16" max="96" value="48" class="w-full accent-primary"/>
                </div>
                <!-- Text Color -->
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-xs font-medium text-slate-400 mb-1 block">Text Color</label>
                        <input type="color" id="style-text-color" value="#FFFFFF" class="w-full h-8 rounded bg-white/5 border border-white/10 cursor-pointer"/>
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-medium text-slate-400 mb-1 block">Outline Color</label>
                        <input type="color" id="style-outline-color" value="#000000" class="w-full h-8 rounded bg-white/5 border border-white/10 cursor-pointer"/>
                    </div>
                </div>
                <!-- Outline Width -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Outline Width: <span id="outline-w-val">2</span></label>
                    <input type="range" id="style-outline-width" min="0" max="8" value="2" class="w-full accent-primary"/>
                </div>
                <!-- Bold/Italic -->
                <div class="flex gap-2">
                    <button class="flex-1 py-1.5 text-sm rounded-lg border border-white/10 text-white hover:bg-white/10 transition-colors" id="style-bold"><b>B</b></button>
                    <button class="flex-1 py-1.5 text-sm rounded-lg border border-white/10 text-white hover:bg-white/10 transition-colors" id="style-italic"><i>I</i></button>
                </div>
                <!-- Position -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Y Position: <span id="pos-y-val">90%</span></label>
                    <input type="range" id="style-pos-y" min="10" max="95" value="90" class="w-full accent-primary"/>
                </div>
                <!-- Rotations -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Subtitle Rotation: <span id="sub-rot-val">0°</span></label>
                    <input type="range" id="style-sub-rotation" min="-180" max="180" value="0" class="w-full accent-primary"/>
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Video Rotation: <span id="vid-rot-val">0°</span></label>
                    <input type="range" id="style-vid-rotation" min="-180" max="180" value="0" class="w-full accent-primary"/>
                </div>
                <!-- Words Per Line -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Words Per Line: <span id="wpl-val">5</span></label>
                    <input type="range" id="style-wpl" min="1" max="15" value="5" class="w-full accent-primary"/>
                </div>
                <!-- Shadow -->
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">
                        <input type="checkbox" id="style-shadow" class="mr-2 accent-primary" checked/> Drop Shadow
                    </label>
                </div>
            </div>

            <!-- Templates Tab -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3 hidden" id="templates-panel">
                <!-- Populated by JS -->
            </div>

            <!-- Animation Tab -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4 hidden" id="animation-panel">
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Animation Type</label>
                    <select id="style-animation" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-white text-sm">
                        <option value="none" class="bg-bg-dark text-slate-100">None</option>
                        <option value="fade" class="bg-bg-dark text-slate-100">Fade In/Out</option>
                        <option value="slide_up" class="bg-bg-dark text-slate-100">Slide Up</option>
                        <option value="slide_down" class="bg-bg-dark text-slate-100">Slide Down</option>
                        <option value="typewriter" class="bg-bg-dark text-slate-100">Typewriter</option>
                        <option value="karaoke" class="bg-bg-dark text-slate-100">Karaoke Highlight</option>
                        <option value="pop" class="bg-bg-dark text-slate-100">Pop / Scale</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-400 mb-1 block">Duration: <span id="anim-dur-val">0.3s</span></label>
                    <input type="range" id="style-anim-duration" min="0.1" max="1.0" step="0.1" value="0.3" class="w-full accent-primary"/>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom — Timeline -->
    <div id="timeline-resizer" class="h-1 bg-white/5 hover:bg-primary/50 cursor-row-resize transition-colors"></div>
    <div id="timeline-container" class="timeline-container h-64 flex flex-col bg-bg-dark z-10 border-t border-white/10">
        <div class="flex items-center justify-between px-4 py-2 border-b border-white/10 bg-[#1c1a0e]">
            <div class="flex gap-2">
                <button class="flex items-center gap-1.5 px-3 py-1 text-sm bg-white/5 border border-white/10 rounded-md text-white hover:bg-white/10 transition-colors" id="btn-split">
                    <span class="material-symbols-outlined" style="font-size:16px">call_split</span> Split
                </button>
                <button class="flex items-center gap-1.5 px-3 py-1 text-sm bg-white/5 border border-white/10 rounded-md text-white hover:bg-white/10 transition-colors" id="btn-trim">
                    <span class="material-symbols-outlined" style="font-size:16px">content_cut</span> Trim
                </button>
            </div>
            <div class="flex items-center gap-3">
                <button class="text-slate-400 hover:text-primary" id="btn-zoom-out">
                    <span class="material-symbols-outlined" style="font-size:18px">zoom_out</span>
                </button>
                <!-- the zoom slider is handled in JS or via native input range -->
                <input type="range" id="zoom-slider" min="0.5" max="20" step="0.1" value="1" class="w-32 accent-primary">
                <button class="text-slate-400 hover:text-primary" id="btn-zoom-in">
                    <span class="material-symbols-outlined" style="font-size:18px">zoom_in</span>
                </button>
            </div>
        </div>
        <div class="flex-1 relative overflow-hidden" id="timeline-wrapper">
            <canvas id="timeline-canvas" class="block w-full h-full cursor-pointer"></canvas>
        </div>
    </div>
</div>

<!-- Export Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay" id="export-modal">
    <div class="bg-bg-surface border border-white/10 rounded-2xl p-8 w-full max-w-md modal-content">
        <h3 class="text-xl font-bold text-white mb-6">Export Video</h3>
        <div class="space-y-4">
            <div>
                <label class="text-sm font-medium text-slate-300 mb-1 block">Format</label>
                <select id="export-format" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white text-sm">
                    <option value="MP4 (H.264)" class="bg-bg-dark text-slate-100" selected>MP4 (H.264)</option>
                    <option value="MOV (H.264)" class="bg-bg-dark text-slate-100">MOV (H.264)</option>
                    <option value="MKV (H.264)" class="bg-bg-dark text-slate-100">MKV (H.264)</option>
                    <option value="WebM (VP9)" class="bg-bg-dark text-slate-100">WebM (VP9)</option>
                </select>
            </div>
            <div id="export-progress-wrap" class="hidden">
                <div class="flex items-center gap-3">
                    <div class="spinner"></div>
                    <div class="flex-1">
                        <p class="text-sm text-white" id="export-status">Exporting...</p>
                        <div class="progress-bar mt-2">
                            <div class="progress-bar-fill" id="export-progress-bar" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex gap-3 mt-8" id="export-buttons">
            <button class="flex-1 bg-white/5 border border-white/10 text-white px-4 py-2 rounded-lg font-medium text-sm hover:bg-white/10" id="export-cancel">Cancel</button>
            <button class="flex-1 bg-primary text-bg-dark px-4 py-2 rounded-lg font-bold text-sm hover:bg-primary-hover" id="export-start">Export</button>
        </div>
        <div class="hidden mt-6" id="export-done">
            <a id="export-download-link" class="block w-full text-center bg-primary text-bg-dark px-4 py-3 rounded-lg font-bold text-sm hover:bg-primary-hover" href="#" download>
                Download Exported Video
            </a>
        </div>
    </div>
</div>

<script src="/static/js/api.js?v=2"></script>
<script src="/static/js/preview.js?v=2"></script>
<script src="/static/js/timeline.js?v=8"></script>
<script src="/static/js/editor.js?v=4"></script>
</body>
</html>
