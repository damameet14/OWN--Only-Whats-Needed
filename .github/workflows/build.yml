# ─────────────────────────────────────────────────────────────────────────────
# OWN — Build & Package (Nuitka + Inno Setup)
# Triggers on version-tag pushes (e.g. v1.0, v2.1.3).
# Produces a single-file installer: OWN_Setup_v1.0.exe
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Package

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install Python dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      # ── 4. Install Playwright Chromium ──────────────────────────────────────
      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      # ── 5. Download FFmpeg ──────────────────────────────────────────────────
      # bin/ is gitignored so we fetch ffmpeg on every build.
      - name: Download FFmpeg
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath  = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          # The archive has a top-level versioned folder; find the binaries inside it
          $ffmpegExe  = Get-ChildItem -Recurse "$env:RUNNER_TEMP\ffmpeg" -Filter "ffmpeg.exe"  | Select-Object -First 1
          $ffprobeExe = Get-ChildItem -Recurse "$env:RUNNER_TEMP\ffmpeg" -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName  -Destination "bin\ffmpeg.exe"
          Copy-Item $ffprobeExe.FullName -Destination "bin\ffprobe.exe"
          Write-Host "FFmpeg binaries placed in bin/"

      # ── 6. Nuitka build ─────────────────────────────────────────────────────
      - name: Build with Nuitka
        run: python build.py

      # ── 7. Install Inno Setup ───────────────────────────────────────────────
      - name: Install Inno Setup
        run: |
          $innoUrl  = "https://jrsoftware.org/download.php/is.exe"
          $innoExe  = "$env:RUNNER_TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoExe
          Start-Process -FilePath $innoExe -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=C:\InnoSetup" -Wait
          Write-Host "Inno Setup installed to C:\InnoSetup"

      # ── 8. Compile installer with Inno Setup ────────────────────────────────
      - name: Create installer with Inno Setup
        run: |
          & "C:\InnoSetup\ISCC.exe" own_installer.iss
          Write-Host "Installer created successfully"

      # ── 9. Upload installer as build artifact ───────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OWN-Installer
          path: Output/OWN_Setup_v1.0.exe
          if-no-files-found: error
